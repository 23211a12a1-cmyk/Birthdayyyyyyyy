<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Abbu💕</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.heart {
  position: fixed;
  width: 20px;
  height: 20px;
  background: pink;
  transform: rotate(45deg);
  animation: float 6s infinite ease-in;
  opacity: 0.7;
}
.heart::before,
.heart::after {
  content: '';
  width: 20px;
  height: 20px;
  background: pink;
  border-radius: 50%;
  position: absolute;
}
.heart::before { top: -10px; left: 0; }
.heart::after { left: -10px; top: 0; }

@keyframes float {
  0% { bottom: -10%; opacity: 0; }
  100% { bottom: 110%; opacity: 0; }
}

section {
  padding: 50px 20px;
}

button {
  background: white;
  color: #ff4f81;
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="lockScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#ff758c;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h1>For You 💕</h1>
<input type="password" id="password" placeholder="Enter code">
<button onclick="checkPassword()">Unlock 💖</button>
<p id="error"></p>
</div>

<div id="mainContent" style="display:none;">

<section>
<h1>Happy Birthday ❤️</h1>
<h3>You are my everything 💕</h3>
</section>

<section>
<h2 id="typing"></h2>
</section>

<section>
<button onclick="reveal()">Click Me 💖</button>
<h3 id="final"></h3>
</section>

</div>

<script>
for(let i=0;i<20;i++){
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random()*100+"vw";
  document.body.appendChild(heart);
}

function checkPassword(){
  if(document.getElementById("password").value==="0404"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
    startTyping();
  } else {
    document.getElementById("error").innerText="Wrong code 💔";
  }
}

const text="I made this just for you 💖";
let i=0;

function startTyping(){
  let t=setInterval(()=>{
    if(i<text.length){
      document.getElementById("typing").innerHTML+=text.charAt(i);
      i++;
    } else clearInterval(t);
  },80);
}

function reveal(){
  document.getElementById("final").innerHTML="I LOVE YOU 💕🎂";
}
</script>

</body>
</html>
